<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

/* ==== PDFs MAIS PROFISSIONAIS ==== */
/* ===== PDFs PROFISSIONAIS COM LOGO ===== */

function carregarLogo(doc, callback){
const img = new Image();
img.src = "public/logo-saude.png";
img.onload = function(){
doc.addImage(img,'PNG',14,10,30,30);
callback();
};
img.onerror=function(){callback();};
}

function generatePatientPdf(record){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

carregarLogo(doc, function(){

doc.setFillColor(15,76,129);
doc.rect(0,0,210,35,'F');

doc.setTextColor(255,255,255);
doc.setFontSize(18);
doc.text("SECRETARIA MUNICIPAL DE SAÚDE",60,20);

doc.setTextColor(40,40,40);
doc.setFontSize(12);

let y = 50;

function linha(titulo,valor){
doc.setFont(undefined,'bold');
doc.text(titulo+":",14,y);
doc.setFont(undefined,'normal');
doc.text(valor || "-",70,y);
y += 8;
}

linha("Paciente",record.pacienteNome);
linha("Documento",record.pacienteDoc);
linha("Telefone",record.pacienteTelefone);
linha("Destino",record.atendimentoLocal);
linha("Procedimento",record.atendimentoTipo);
linha("Data",record.viagemData);
linha("Transporte",record.viagemTipo);
linha("Motorista",record.viagemMotorista);

y+=12;

doc.setFont(undefined,'bold');
doc.text("Assinatura do paciente:",14,y);
doc.line(70,y,180,y);

y+=20;

doc.setFontSize(10);
doc.text("Documento gerado pelo Sistema de Transporte da Secretaria de Saúde.",14,y);

doc.save("termo-"+(record.pacienteNome||"paciente")+".pdf");

});

}

    function openPage(pageId){
      if(pageId==="secretarioPage"){
        const senha=prompt("Senha da Secretaria");
        if(senha!=="fran2026"){
          alert("Senha incorreta");
          return;
        }
      }

      currentPageId = pageId;
      pages().forEach(p => p.classList.remove('active'));
      navButtons().forEach(b => b.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      document.querySelector(`.nav-btn[data-page="${pageId}"]`).classList.add('active');
      document.getElementById('pageTitle').textContent = pageMeta[pageId].title;
      document.getElementById('pageSubtitle').textContent = pageMeta[pageId].subtitle;
      refreshAll();
    }

    function applyRoleAccess(role) {
      document.getElementById('currentRoleLabel').textContent = roleMap[role].label;
      const targetPage = roleMap[role].page;
      openPage(targetPage);

      if (role === 'marcacao') {
        document.querySelector('.nav-btn[data-page="transportePage"]').style.display = 'none';
        document.querySelector('.nav-btn[data-page="secretarioPage"]').style.display = 'none';
      } else if (role === 'transporte') {
        document.querySelector('.nav-btn[data-page="secretarioPage"]').style.display = 'none';
        document.querySelector('.nav-btn[data-page="transportePage"]').style.display = '';
        document.querySelector('.nav-btn[data-page="marcacaoPage"]').style.display = '';
      } else {
        navButtons().forEach(btn => btn.style.display = '');
      }
    }

    function refreshStats() {
      const records = getRecords();
      const today = todayStr();
      const weekRecords = records.filter(r => isDateInCurrentWeek(r.viagemData));

      document.getElementById('markToday').textContent = records.filter(r => r.viagemData === today).length;
      document.getElementById('markWeek').textContent = weekRecords.length;
      document.getElementById('markNoVehicle').textContent = weekRecords.filter(r => !r.viagemTipo).length;
      document.getElementById('markNoDriver').textContent = weekRecords.filter(r => !r.viagemMotorista).length;

      document.getElementById('weekTripsCount').textContent = weekRecords.length;
      document.getElementById('pendingVehicleCount').textContent = weekRecords.filter(r => !r.viagemTipo).length;
      document.getElementById('pendingDriverCount').textContent = weekRecords.filter(r => !r.viagemMotorista).length;
      document.getElementById('todayTripsCount').textContent = records.filter(r => r.viagemData === today).length;

      document.getElementById('totalRegistros').textContent = records.length;
      document.getElementById('registrosHoje').textContent = records.filter(r => r.viagemData === today).length;
      document.getElementById('diasComViagem').textContent = new Set(records.map(r => r.viagemData).filter(Boolean)).size;
      document.getElementById('semMotorista').textContent = records.filter(r => !r.viagemMotorista).length;
    }

    function renderTransportePage() {
      const records = getRecords();
      const weekDates = getWeekDates();
      const weekNames = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab', 'Dom'];
      const weekView = document.getElementById('weekView');
      weekView.innerHTML = '';

      weekDates.forEach((dateObj, index) => {
        const year = dateObj.getFullYear();
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const day = String(dateObj.getDate()).padStart(2, '0');
        const iso = `${year}-${month}-${day}`;
        const dayRecords = records.filter(r => r.viagemData === iso);

        const col = document.createElement('div');
        col.className = 'day-column';
        col.innerHTML = `<h4>${weekNames[index]} - ${formatDate(iso)}</h4>`;

        if (!dayRecords.length) {
          col.innerHTML += `<div class="empty">Sem viagens</div>`;
        } else {
          dayRecords.forEach(r => {
            const el = document.createElement('div');
            el.className = 'trip-item';
            el.innerHTML = `
              <strong>${r.pacienteNome || '-'}</strong>
              <div class="muted">${r.atendimentoLocal || '-'} • ${r.atendimentoHorario || '-'}</div>
              <div class="tag" style="margin:8px 0;">${r.viagemTipo || 'Sem tipo'}</div>
              <div class="field"><label>Veículo / Placa</label><input data-id="${r.id}" data-field="viagemTipo" value="${r.viagemTipo || ''}"></div>
              <div class="field"><label>Motorista</label><input data-id="${r.id}" data-field="viagemMotorista" value="${r.viagemMotorista || ''}"></div>
              <div class="field"><label>CPF do motorista</label><input data-id="${r.id}" data-field="motoristaCpf" value="${r.motoristaCpf || ''}"></div>
              <div class="field"><label>Telefone do motorista</label><input data-id="${r.id}" data-field="motoristaTelefone" value="${r.motoristaTelefone || ''}"></div>
              <div class="field"><label>Categoria CNH</label><input data-id="${r.id}" data-field="motoristaCategoria" value="${r.motoristaCategoria || ''}"></div>
              <button class="btn btn-primary save-transport-btn" data-id="${r.id}">Salvar dados</button>
            `;
            col.appendChild(el);
          });
        }

        weekView.appendChild(col);
      });

      document.querySelectorAll('.save-transport-btn').forEach(btn => {
        btn.onclick = async () => {
          const id = btn.dataset.id;
          const records = [...getRecords()];
          const target = records.find(r => r.id === id);
          if (!target) return;

          document.querySelectorAll(`[data-id="${id}"]`).forEach(input => {
            target[input.dataset.field] = input.value.trim();
          });

          await saveRecords(records);
          refreshAll();
          alert('Dados do transporte atualizados com sucesso.');
        };
      });
    }

    function groupByDate(records) {
      return records.reduce((acc, r) => {
        acc[r.viagemData] = acc[r.viagemData] || [];
        acc[r.viagemData].push(r);
        return acc;
      }, {});
    }

    function renderSecretarioPage() {
      let records = [...getRecords()].sort((a, b) => (new Date(a.viagemData) - new Date(b.viagemData)));
      const filtroData = document.getElementById('filtroData').value;
      const buscaPaciente = document.getElementById('buscaPaciente').value.trim().toLowerCase();

      if (filtroData) records = records.filter(r => r.viagemData === filtroData);
      if (buscaPaciente) records = records.filter(r => (r.pacienteNome || '').toLowerCase().includes(buscaPaciente));

      const container = document.getElementById('secretarioList');
      if (!records.length) {
        container.innerHTML = '<div class="empty">Nenhum registro encontrado.</div>';
        return;
      }

      const grouped = groupByDate(records);
      const dates = Object.keys(grouped).sort((a, b) => (a < b ? 1 : -1));

      container.innerHTML = dates.map(date => {
        const rows = grouped[date].map(r => `
          <tr>
            <td>${r.pacienteNome || '-'}</td>
            <td>${r.atendimentoLocal || '-'}</td>
            <td>${r.atendimentoTipo || '-'}</td>
            <td>${r.atendimentoHorario || '-'}</td>
            <td>${r.viagemTipo || '-'}</td>
            <td>${r.viagemTipo || '-'}</td>
            <td>${r.viagemMotorista || '-'}</td>
            <td>
              <div class="actions">
                <button class="btn btn-light pdf-individual-btn" data-id="${r.id}">PDF</button>
                <button class="btn btn-warning edit-record-btn" data-id="${r.id}">Editar</button>
                <button class="btn btn-danger delete-record-btn" data-id="${r.id}">Excluir</button>
              </div>
            </td>
          </tr>
        `).join('');

        return `
          <div class="subcard" style="margin-bottom:16px;">
            <div class="panel-header" style="margin-bottom:10px;">
              <div>
                <h3 style="font-size:18px; margin:0;">${formatDate(date)}</h3>
                <p>${grouped[date].length} registro(s) nesta data</p>
              </div>
              <button class="btn btn-success pdf-date-btn" data-date="${date}">PDF desta data</button>
            </div>
            <table>
              <thead>
                <tr>
                  <th>Paciente</th>
                  <th>Local</th>
                  <th>Atendimento</th>
                  <th>Horário</th>
                  <th>Transporte</th>
                  <th>Veículo</th>
                  <th>Motorista</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        `;
      }).join('');

      document.querySelectorAll('.pdf-individual-btn').forEach(btn => {
        btn.onclick = () => {
          const rec = getRecords().find(r => r.id === btn.dataset.id);
          if (rec) generatePatientPdf(rec);
        };
      });

      document.querySelectorAll('.delete-record-btn').forEach(btn => {
        btn.onclick = async () => {
          if (!confirm('Deseja realmente excluir este registro?')) return;
          const updated = getRecords().filter(r => r.id !== btn.dataset.id);
          await saveRecords(updated);
          refreshAll();
        };
      });

      document.querySelectorAll('.pdf-date-btn').forEach(btn => {
        btn.onclick = () => {
          const date = btn.dataset.date;
          const dayRecords = getRecords().filter(r => r.viagemData === date);
          generateDailyPdf(dayRecords, date, `relatorio-${date}.pdf`);
        };
      });
    }

    function refreshAll() {
      refreshStats();
      renderTransportePage();
      renderSecretarioPage();
    }

    document.getElementById('bookingForm').addEventListener('submit', async e => {
      e.preventDefault();
      const record = collectFormData();
      if (!record.pacienteNome || !record.viagemData) {
        alert('Preencha pelo menos o nome do paciente e a data da viagem.');
        return;
      }
      const saved = await saveRecord(record);
      if (!saved) return;
      e.target.reset();
      alert('Marcação salva com sucesso.');
    });

    document.getElementById('saveAndPdfBtn').addEventListener('click', async () => {
      const record = collectFormData();
      if (!record.pacienteNome || !record.viagemData) {
        alert('Preencha pelo menos o nome do paciente e a data da viagem.');
        return;
      }
      const saved = await saveRecord(record);
      if (!saved) return;
      generatePatientPdf(record);
      document.getElementById('bookingForm').reset();
      alert('Marcação salva e PDF gerado.');
    });

    document.getElementById('filtroData').addEventListener('input', renderSecretarioPage);
    document.getElementById('buscaPaciente').addEventListener('input', renderSecretarioPage);

    document.getElementById('limparFiltrosBtn').addEventListener('click', () => {
      document.getElementById('filtroData').value = '';
      document.getElementById('buscaPaciente').value = '';
      renderSecretarioPage();
    });

    document.getElementById('pdfDiaBtn').addEventListener('click', () => {
      const date = document.getElementById('filtroData').value;
      if (!date) {
        alert('Selecione uma data para gerar o PDF.');
        return;
      }
      generateDailyPdf(getRecords().filter(r => r.viagemData === date), date, `relatorio-${date}.pdf`);
    });

    document.getElementById('pdfHojeBtn').addEventListener('click', () => {
      const date = todayStr();
      generateDailyPdf(getRecords().filter(r => r.viagemData === date), date, `relatorio-${date}.pdf`);
    });

    document.getElementById('loginRole').addEventListener('change', e => {
      document.getElementById('passwordField').style.display = e.target.value === 'secretario' ? 'block' : 'none';
    });

    document.getElementById('enterAppBtn').addEventListener('click', async () => {
      const role = document.getElementById('loginRole').value;
      const password = document.getElementById('loginPassword').value;
      if (role === 'secretario' && password !== SECRETARIO_PASSWORD) {
        alert('Senha do secretário incorreta.');
        return;
      }

      await loadRecordsFromSupabase();
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('appShell').classList.remove('hidden');
      applyRoleAccess(role);
      refreshAll();
    });

    navButtons().forEach(btn => {
      btn.addEventListener('click', () => openPage(btn.dataset.page));
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      document.getElementById('appShell').classList.add('hidden');
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('loginPassword').value = '';
    });

    document.getElementById('backupBtn').addEventListener('click', () => {
      const data = JSON.stringify(getRecords(), null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'backup-transporte-saude.json';
      a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById('restoreInput').addEventListener('change', async e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async evt => {
        try {
          const data = JSON.parse(evt.target.result);
          if (!Array.isArray(data)) throw new Error('Formato inválido');
          await saveRecords(data);
          refreshAll();
          alert('Backup importado com sucesso.');
        } catch (err) {
          console.error(err);
          alert('Arquivo inválido para importação.');
        }
      };
      reader.readAsText(file);
    });
  

document.getElementById('filtroTipoTransporte')?.addEventListener('input', renderSecretarioPage);


function gerarPdfVeiculo(lista,data,tipoTransporte){

const cidade=lista[0]?.atendimentoLocal||"________";

doc.setFontSize(14);
doc.text("SECRETARIA MUNICIPAL DE SAÚDE DE WAGNER",14,y);
y+=8;

doc.setFontSize(11);
doc.text("Tipo de transporte: "+tipoTransporte,14,y);
y+=6;
doc.text("Cidade de destino: "+cidade,14,y);
y+=10;

const texto=`A SECRETARIA MUNICIPAL DE SAÚDE DE WAGNER, ESTA TRANSPORTANDO PARA CIDADE DE ${cidade}, OS PACIENTES ABAIXO RELACIONADOS COM O OBJETIVO DE REALIZAR PROCEDIMENTOS MÉDICOS (EXAMES, CONSULTAS E CIRURGIAS) QUE NÃO SÃO OFERECIDOS EM NOSSO MUNICÍPIO E EM CIDADES CIRCUNVIZINHAS.`;

const linhas=doc.splitTextToSize(texto,180);
doc.text(linhas,14,y);
y+=linhas.length*6+10;

lista.forEach((r,i)=>{

doc.text((i+1)+". "+(r.pacienteNome||""),14,y);

const linhasResumo=doc.splitTextToSize(resumo,180);

doc.text(linhasResumo,18,y);

doc.addPage();

}

});

y+=6;
doc.text("FRANCINEIDE OLIVEIRA DA SILVA",14,y);
y+=6;
doc.text("Secretaria Municipal De Saúde",14,y);
y+=6;
doc.text("Decreto 007/2025",14,y);

doc.save("lista-"+tipoTransporte+"-"+data+".pdf");
}

/* ===== LISTA DE MARCAÇÕES NA PÁGINA DE MARCAÇÃO ===== */

function renderMarcacoesSalvas(){

const lista=document.getElementById("listaMarcacoesSalvas")
if(!lista) return

const registros=getRecords().slice().sort((a,b)=> new Date(a.viagemData)-new Date(b.viagemData))

if(!registros.length){
lista.innerHTML="<div class='empty'>Nenhuma marcação cadastrada</div>"
return
}

lista.innerHTML=registros.map(r=>`
<div style="border:1px solid #e2ebf5;border-radius:12px;padding:10px;margin-bottom:8px;background:#fff">
<b>${r.pacienteNome||"-"}</b><br>
<span class="muted">${r.viagemData||"-"} • ${r.atendimentoLocal||"-"}</span><br>

<button class="btn btn-warning" onclick="editarMarcacao('${r.id}')">Editar</button>
</div>
`).join("")

}

function editarMarcacao(id){

const r=getRecords().find(x=>x.id===id)
if(!r) return

window.editingId=id

document.getElementById("pacienteNome").value=r.pacienteNome||""
document.getElementById("pacienteDoc").value=r.pacienteDoc||""
document.getElementById("pacienteEndereco").value=r.pacienteEndereco||""
document.getElementById("pacienteTelefone").value=r.pacienteTelefone||""
document.getElementById("pacienteNecessidades").value=r.pacienteNecessidades||""

document.getElementById("acompNome").value=r.acompNome||""
document.getElementById("acompDoc").value=r.acompDoc||""
document.getElementById("acompTelefone").value=r.acompTelefone||""

document.getElementById("atendimentoLocal").value=r.atendimentoLocal||""
document.getElementById("atendimentoTipo").value=r.atendimentoTipo||""
document.getElementById("atendimentoHorario").value=r.atendimentoHorario||""

document.getElementById("viagemTipo").value=r.viagemTipo||""
document.getElementById("viagemData").value=r.viagemData||""
document.getElementById("viagemEmbarque").value=r.viagemEmbarque||""
document.getElementById("viagemMotorista").value=r.viagemMotorista||""

document.getElementById("observacao").value=r.observacao||""

window.scrollTo({top:0,behavior:"smooth"})
}

setTimeout(renderMarcacoesSalvas,800)
